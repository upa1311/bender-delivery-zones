name: CI

# Offline quality gates only. CI never downloads the Moldova PBF, never contacts
# Nominatim/Overpass, never runs the full spatial audit, and never builds a
# routing graph. It exercises the scaffold with mocked I/O and the tiny fixture.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync (locked)
        run: uv sync --locked

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest

      - name: Audit CLI help (no network, no PBF, no spatial audit)
        run: uv run python scripts/audit_osm.py --help

  verify-provenance:
    # Verifies the OSRM pin and the vendored car.lua WITHOUT building the graph:
    # the multi-GB rebuild stays a documented local workflow, but the provenance
    # tying published results to a pinned engine is checked on every push.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Vendored profile checksums
        run: cd vendor/osrm && sha256sum -c CHECKSUMS.sha256
      - name: Build record matches the pin
        run: python scripts/verify_provenance.py
