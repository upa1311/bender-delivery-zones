# Stage 06 — ordered tariff distance bands.
#
# Zones are cost ranges over origin-weighted OSRM road kilometres, NOT spatial
# clusters. Bands are intervals on the sorted cost axis, so they are monotonic,
# mutually exclusive and exhaustive by construction.

bands:
  k_values: [4, 5]
  bin_width_km: 0.05        # cost-axis bin for the exact 1-D weighted DP
  min_weight_share: 0.12    # no economically meaningless sliver band
  max_weight_share: 0.40    # and no giant catch-all zone
  polygon_reach_m: 120      # max distance a band polygon extends from a unit

osrm:
  url: "http://127.0.0.1:5000"
  table_chunk: 300          # destinations per /table request

units:
  # No automatic Tier A: a unit farther than this from any serviceable street
  # becomes the explicit exception no_serviceable_street_within_threshold.
  street_attach_threshold_m: 150
  cluster_radius_m: 80
  dense_cluster_min_units: 5

# Split-street penalty sweep. The penalty is added to the DP objective for every
# street a band boundary cuts, in the same units as the weighted squared
# kilometre deviation. All strengths are published; the owner picks.
split_penalty:
  published_strength: low
  # Scale-free: 0.05 means "a cut tearing apart ALL address demand costs 5% of
  # the total weight". Comparable to the distance term at any dataset size.
  strengths:
    baseline: 0.0
    low: 0.3
    medium: 1.0
    high: 3.0

# Demand-weight sensitivity. No confidence factor is chosen silently: the
# published bands use model A (confirmed addresses only); B and C are published
# as sensitivity so the owner can see how far the edges move.
sensitivity:
  published_model: A
  apartment_level_cap: 5
  models:
    A: 0.0     # confirmed address units only
    B: 0.25    # + unaddressed residential buildings at 0.25
    C: 0.50    # + unaddressed residential buildings at 0.50
