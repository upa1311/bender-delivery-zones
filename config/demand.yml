# Stage 04 — residential demand audit.
#
# Building classes and demand tiers are defined in src/bender_zones/demand.py.
# This file holds the tunable thresholds and the owner's VERIFIED external
# core-street evidence. External evidence is validation metadata only: no map
# scraping, no proprietary coordinates — it only marks a street as confirmed
# core, and the geometry still comes from the local OSM extract.

thresholds:
  tier_a_residential_buildings: 8
  tier_a_confirmed_addresses: 5
  tier_b_min_residential: 3
  tier_b_max_residential: 7
  tier_c_max_residential: 2

# Radius used to attribute buildings/addresses/POIs to a street centreline.
street_corridor_m: 60

# STRICT whitelist of active civic/commercial POIs. Only these named values count
# as demand evidence. Generic street furniture and technical objects (parking,
# bench, toilets, shelter, waste_basket, vending_machine, ...) are excluded, and
# an object must also carry a name to count.
poi_whitelist:
  amenity: [restaurant, cafe, fast_food, food_court, school, kindergarten,
            hospital, clinic, doctors, pharmacy, marketplace, post_office, bank,
            townhall, community_centre, library, college, university, veterinary]
  shop: [supermarket, convenience, bakery, butcher, greengrocer, general,
         department_store, mall, kiosk]
  tourism: [hotel, guest_house, hostel, motel]
poi_require_name: true
# Explicitly never counted, even if named (documented for the audit report).
poi_excluded_examples: [parking, bench, toilets, shelter, waste_basket,
                        vending_machine, bicycle_parking, drinking_water,
                        recycling, fuel, car_wash]

# Verified core streets per territory, matched case-insensitively as stems
# against the street's Russian display name. Matching a stem sets
# official_web_evidence=true (Tier A evidence).
