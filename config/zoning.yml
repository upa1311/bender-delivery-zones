# Stage 05 — routing-based candidate zones (K=4 and K=5).
#
# Zones are built on ACTUAL road travel distance and time over the local OSM
# road graph, never on straight-line distance or polygon area. No monetary
# prices are produced: taxi calibration stays null (config/taxi-calibration.yml)
# until the owner supplies tariffs. Neither K is chosen automatically.

k_values: [4, 5]

# Assumed free-flow speeds (km/h) per highway class, used only when the way has
# no usable maxspeed tag. These are travel-time assumptions, NOT tariffs.
speeds_kmh:
  motorway: 90
  motorway_link: 60
  trunk: 80
  trunk_link: 55
  primary: 60
  primary_link: 45
  secondary: 55
  secondary_link: 40
  tertiary: 50
  tertiary_link: 40
  unclassified: 40
  residential: 30
  living_street: 15
  service: 15
  road: 30
default_speed_kmh: 30

# Highway classes the delivery vehicle may use.
drivable_highways:
  [motorway, motorway_link, trunk, trunk_link, primary, primary_link, secondary,
   secondary_link, tertiary, tertiary_link, unclassified, residential,
   living_street, service, road]

routing:
  snap_radius_m: 150        # customer -> nearest road node; beyond this = exception
  node_snap_m: 1            # graph node coordinate quantisation
  buffer_around_boundaries_m: 500   # routing extract padding, to keep roads connected

zoning:
  iterations: 8             # Lloyd-style refinement over network travel time
  uncertain_margin_pct: 10  # 2nd-best zone within this % of travel time => uncertain
  outlier_percentile: 95    # "maximum reasonable route" excludes the tail above this
  zone_buffer_m: 150          # buffer used to draw a zone polygon around its customers
